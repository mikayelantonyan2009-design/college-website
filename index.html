<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>MPS</title>

<style>

body{
margin:0;
background:white;
font-family:Arial, sans-serif;
}

/* top bar */
.topbar{
width:100%;
height:70px;
background:white;
display:flex;
align-items:center;
justify-content:space-between;
padding:0 20px;
border-bottom:1px solid #eee;
}

/* logo */
.logo{
height:50px;
}

/* right side icons */
.icons{
display:flex;
gap:20px;
}

/* icon style */
.icon{
color:#B10DC9;
font-size:24px;
cursor:pointer;
user-select:none;
}

</style>
</head>

<body>

<div class="topbar">

<img src="logo.png" class="logo">

<div class="icons">
<div class="icon">🌐</div>
<div class="icon">⚙</div>
<div class="icon">☰</div>
</div>

</div>

</body>
</html>
